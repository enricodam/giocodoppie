  var box=E("div",{s:{background:"rgba(46,204,64,.08)",borderRadius:"20px",padding:"24px",marginTop:"20px",border:"2px solid rgba(46,204,64,.15)",textAlign:"center"}});
  box.appendChild(E("div",{s:{fontSize:"14px",color:"#888",marginBottom:"4px"}},[name]));
  var gr=E("div",{s:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginTop:"12px"}});
  var s1=E("div");s1.appendChild(E("div",{c:"b",s:{fontSize:"36px",color:"#2ecc40"}},[String(sc)]));s1.appendChild(E("div",{s:{fontSize:"13px",color:"#888"}},["Punti"]));
  var s2=E("div");s2.appendChild(E("div",{c:"b",s:{fontSize:"36px",color:"#FFD700"}},[String(bs)]));s2.appendChild(E("div",{s:{fontSize:"13px",color:"#888"}},["Miglior Combo"]));
  gr.appendChild(s1);gr.appendChild(s2);box.appendChild(gr);
  if(errors.length>0)box.appendChild(E("div",{s:{marginTop:"12px",fontSize:"15px",color:"#e74c3c"}},["❌ "+errors.length+" error"+(errors.length===1?"e":"i")]));
  else box.appendChild(E("div",{s:{marginTop:"12px",fontSize:"15px",color:"#2ecc40"}},["✅ Zero errori! Perfetto!"]));
  w.appendChild(box);c.appendChild(w);

  if(errors.length>0){
    c.appendChild(errBox(errors,makeRetryErrFn(errors),retryAllFn));
  } else {
    var btns=E("div",{c:"row",s:{marginTop:"24px",justifyContent:"center"}});
    btns.appendChild(E("button",{c:"b",s:{padding:"12px 28px",fontSize:"18px",background:"linear-gradient(135deg,#2ecc40,#27ae60)",color:"#fff",borderRadius:"14px"},onclick:retryAllFn},["🔄 Rigioca"]));
    btns.appendChild(E("button",{c:"b",s:{padding:"12px 28px",fontSize:"18px",background:"linear-gradient(135deg,#333,#555)",color:"#fff",borderRadius:"14px"},onclick:menu},["🏠 Menu"]));
    c.appendChild(btns);
  }
}

/*═══ MENU ═══*/
function menu(){
  if(_gtmr){clearInterval(_gtmr);_gtmr=null}
  renderHdr(false);
  var c=$("ct");c.innerHTML="";
  var w=E("div",{s:{animation:"fu .5s ease-out"}});
  var ban=E("div",{s:{textAlign:"center",margin:"12px 0 24px",padding:"20px",borderRadius:"20px",background:"linear-gradient(135deg,rgba(46,204,64,.12),rgba(46,204,64,.03))",border:"2px solid rgba(46,204,64,.15)"}});
  ban.appendChild(E("div",{s:{fontSize:"60px",animation:"fl 3s ease-in-out infinite"}},["🗡️⚔️🗡️"]));
  ban.appendChild(E("div",{s:{fontSize:"15px",color:"#8ecfaa",marginTop:"8px",fontStyle:"italic"}},['"Niente succede se non ti alleni tutti i giorni!"']));
  ban.appendChild(E("div",{s:{fontSize:"12px",color:"#5a8a6a",marginTop:"4px"}},["- Lo Spadaccino"]));
  w.appendChild(ban);
  w.appendChild(E("div",{c:"b",s:{fontSize:"16px",color:"#2ecc40",letterSpacing:"2px",marginBottom:"12px",textAlign:"center"}},["SCEGLI IL TUO ALLENAMENTO"]));
  var gs=[
    {t:"La Scelta dello Spadaccino",ds:"Scegli la forma giusta tra due opzioni!",i:"⚔️",co:"#2ecc40",fn:g1},
    {t:"Le Tre Spade",ds:"Singola o doppia? Attento alle trappole!",i:"🗡️",co:"#3498db",fn:g2},
    {t:"Tre Lame Veloci",ds:"Velocità! Giusta o sbagliata? 45 secondi!",i:"⚡",co:"#f39c12",fn:g3}
  ];
  var list=E("div",{c:"col"});
  gs.forEach(function(g,i){
    var btn=E("button",{c:"mb",s:{background:"linear-gradient(135deg,"+g.co+"11,"+g.co+"05)",borderColor:g.co+"33",animation:"fu .5s ease-out "+(i*.1)+"s both"},onclick:function(){g.fn()}});
    btn.appendChild(E("div",{s:{fontSize:"36px",width:"52px",height:"52px",display:"flex",alignItems:"center",justifyContent:"center",background:g.co+"15",borderRadius:"14px",flexShrink:"0"}},[g.i]));
    var info=E("div");
    info.appendChild(E("div",{c:"b",s:{fontSize:"20px",color:g.co,letterSpacing:"1px"}},[g.t]));
    info.appendChild(E("div",{s:{fontSize:"13px",color:"#999"}},[g.ds]));
    btn.appendChild(info);list.appendChild(btn);
  });
  w.appendChild(list);
  var tip=E("div",{s:{marginTop:"24px",textAlign:"center",padding:"16px",background:"rgba(255,215,0,.05)",borderRadius:"14px",border:"1px solid rgba(255,215,0,.1)"}});
  tip.innerHTML='<div style="font-size:13px;color:#888">🏴‍☠️ Ogni gioco ha <strong style="color:#FFD700">10 domande</strong> ('+W.length+' parole nel database!)</div><div style="font-size:13px;color:#888;margin-top:4px">Fai <strong style="color:#ff6432">combo</strong> per punti bonus! 🔥</div>';
  w.appendChild(tip);c.appendChild(w);
}

/*═══ GAME 1: La Scelta dello Spadaccino ═══*/
function g1(custom){
  renderHdr(true);
  var qs=sh(custom||W).slice(0,custom?custom.length:10),cur=0,sc=0,st=0,bs=0,errs=[];
  var TOT=qs.length;
  function render(){
    var c=$("ct");c.innerHTML="";
    if(cur>=TOT){
      showRes("La Scelta dello Spadaccino",sc,bs,TOT,errs,function(){g1()},function(e){return function(){
        var rw=e.map(function(er){return W.find(function(w){return w.w===er.correct})}).filter(Boolean);
        if(rw.length)g1(rw);
      }});
      return;
    }
    var q=qs[cur],done=false;
    var opts=Math.random()>.5?[q.w,q.x]:[q.x,q.w];
    var w=E("div",{s:{animation:"fu .5s ease-out"}});
    w.appendChild(sbar((cur+1)+"/"+TOT,sc,st));
    var cd=E("div",{c:"card",s:{marginBottom:"20px"}});
    cd.appendChild(E("div",{s:{fontSize:"16px",color:"#aaa",marginBottom:"8px"}},["Indizio:"]));
    cd.appendChild(E("div",{s:{fontSize:"22px",fontWeight:"700",lineHeight:"1.4"}},[q.h]));
    w.appendChild(cd);
    w.appendChild(E("div",{s:{fontSize:"14px",textAlign:"center",color:"#8ecfaa",marginBottom:"16px",fontWeight:"600"}},["🗡️ Quale forma è corretta?"]));
    var row=E("div",{c:"row"});
    opts.forEach(function(o){
      row.appendChild(E("button",{c:"ob od",onclick:function(){
        if(done)return;done=true;
        row.querySelectorAll("button").forEach(function(b){b.disabled=true;b.className=b.textContent===q.w.toUpperCase()?"ob oc":"ob ow"});
        var ok=o===q.w,bo=0;
        if(ok){bo=st>=2?5:0;sc+=10+bo;st++;if(st>bs)bs=st}else{st=0;errs.push({given:o,correct:q.w,hint:q.h})}
        w.appendChild(fbx(ok,ok?pk(QOK):pk(QNO),ok?(bo>0?"+"+bo+" bonus combo! 🔥":null):"Quella giusta era: "+q.w.toUpperCase(),cur+1>=TOT?"Vedi Risultati ➜":"Avanti ➜",function(){cur++;render()}));
        $("ct").scrollTop=$("ct").scrollHeight;
      }},[o.toUpperCase()]));
    });
    w.appendChild(row);c.appendChild(w);
  }
  render();
}

/*═══ GAME 2: Le Tre Spade (BALANCED) ═══*/
function g2(custom){
  renderHdr(true);
  var pool;
  if(custom){pool=sh(custom)}
  else{
    var dw=sh(W.filter(function(w){return w.t==="d"})).slice(0,6);
    var sw=sh(W.filter(function(w){return w.t==="s"})).slice(0,4);
    pool=sh(dw.concat(sw));
  }
  var TOT=pool.length,cur=0,sc=0,st=0,bs=0,errs=[];

  function mkQ(item){
    if(item.t==="d"){
      var idx=item.w.indexOf(item.d[0]);
      return{w:item.w,h:item.h,bf:item.w.slice(0,idx),af:item.w.slice(idx+2),a:item.d[0],b:item.d,ok:item.d};
    }
    // type "s": find which letter was doubled in wrong version
    var cw=item.w,wx=item.x,di=-1;
    for(var i=0;i<wx.length;i++){if(i>=cw.length||wx[i]!==cw[i]){di=i;break}}
    if(di<0)di=1;
    var ch=cw[di];
    return{w:item.w,h:item.h,bf:cw.slice(0,di),af:cw.slice(di+1),a:ch,b:ch+ch,ok:ch};
  }

  function render(){
    var c=$("ct");c.innerHTML="";
    if(cur>=TOT){
      showRes("Le Tre Spade",sc,bs,TOT,errs,function(){g2()},function(e){return function(){
        var rw=e.map(function(er){return W.find(function(w){return w.w===er.correct})}).filter(Boolean);
        if(rw.length)g2(rw);
      }});
      return;
    }
    var q=mkQ(pool[cur]),done=false;
    var w=E("div",{s:{animation:"fu .5s ease-out"}});
    w.appendChild(sbar((cur+1)+"/"+TOT,sc,st));
    var cd=E("div",{c:"card",s:{marginBottom:"20px"}});
    cd.appendChild(E("div",{s:{fontSize:"15px",color:"#aaa",marginBottom:"8px"}},["Indizio:"]));
    cd.appendChild(E("div",{s:{fontSize:"20px",fontWeight:"700",marginBottom:"20px"}},[q.h]));
    var wr=E("div",{c:"b",s:{fontSize:"36px",letterSpacing:"4px",display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}});
    wr.appendChild(E("span",null,[q.bf.toUpperCase()]));
    var bl=E("span",{id:"bl",s:{display:"inline-block",minWidth:"50px",borderBottom:"4px solid #2ecc40",color:"#2ecc40",animation:"bl 1s infinite"}},["?"]);
    wr.appendChild(bl);wr.appendChild(E("span",null,[q.af.toUpperCase()]));
    cd.appendChild(wr);w.appendChild(cd);
    w.appendChild(E("div",{s:{fontSize:"14px",textAlign:"center",color:"#8ecfaa",marginBottom:"16px",fontWeight:"600"}},["⚔️ Singola o doppia? Attento!"]));
    var opts=Math.random()>.5?[q.a,q.b]:[q.b,q.a];
    var row=E("div",{c:"row"});
    opts.forEach(function(o){
      row.appendChild(E("button",{c:"ob od",s:{fontSize:"32px",letterSpacing:"4px"},onclick:function(){
        if(done)return;done=true;
        bl.style.animation="none";bl.textContent=q.ok.toUpperCase();
        var ok=o===q.ok;
        bl.style.color=ok?"#2ecc40":"#e74c3c";
        row.querySelectorAll("button").forEach(function(b){b.disabled=true;b.className=b.textContent===q.ok.toUpperCase()?"ob oc":"ob ow"});
        var bo=0,gw=q.bf+o+q.af;
        if(ok){bo=st>=2?5:0;sc+=10+bo;st++;if(st>bs)bs=st}else{st=0;errs.push({given:gw,correct:q.w,hint:q.h})}
        w.appendChild(fbx(ok,ok?pk(QOK):pk(QNO),ok?(bo>0?"+"+bo+" bonus combo! 🔥":null):"Quella giusta era: "+q.w.toUpperCase(),cur+1>=TOT?"Vedi Risultati ➜":"Avanti ➜",function(){cur++;render()}));
        $("ct").scrollTop=$("ct").scrollHeight;
      }},[o.toUpperCase()]));
    });
    w.appendChild(row);c.appendChild(w);
  }
  render();
}

/*═══ GAME 3: Tre Lame Veloci ═══*/
function g3(custom){
  renderHdr(true);
  var pool=sh(custom||W).slice(0,custom?custom.length:25);
  var qs=pool.map(function(w){var ok=Math.random()>.5;return{disp:ok?w.w:w.x,ok:ok,correct:w.w,wrong:w.x,hint:w.h}});
  var cur=0,sc=0,st=0,bs=0,tl=45,ans=0,over=false,tmr=null,errs=[];
  var errTO=null,blocked=false;

  function end(){
    if(over)return;over=true;clearInterval(tmr);
    setTimeout(function(){
      showRes("Tre Lame Veloci",sc,bs,ans,errs,function(){g3()},function(e){return function(){
        var rw=e.map(function(er){return W.find(function(w){return w.w===er.correct})}).filter(Boolean);
        if(rw.length)g3(rw);
      }});
    },500);
  }

  function render(){
    var c=$("ct");c.innerHTML="";
    var w=E("div",{s:{animation:"fu .5s ease-out"}});
    var bar=E("div",{s:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}});
    var tc=tl>15?"#2ecc40":tl>5?"#f39c12":"#e74c3c";
    bar.appendChild(E("div",{c:"badge",id:"tmr",s:{background:tc+"22",color:tc,fontSize:"22px"}},["⏰ "+tl+"s"]));
    bar.appendChild(E("div",{c:"badge",id:"scd",s:{background:"rgba(255,215,0,.15)",color:"#FFD700"}},["💰 "+sc]));
    if(st>=2)bar.appendChild(E("div",{c:"badge",s:{background:"rgba(255,100,50,.2)",color:"#ff6432",fontSize:"16px"}},["🔥 x"+st]));
    w.appendChild(bar);
    var track=E("div",{c:"tb"});track.appendChild(E("div",{c:"tf",id:"tfl",s:{background:tc,width:(tl/45*100)+"%"}}));
    w.appendChild(track);
    w.appendChild(E("div",{s:{textAlign:"center",marginBottom:"16px",fontSize:"14px",color:"#8ecfaa",fontWeight:"600"}},["⚡ Scritta bene o male? Decidi in fretta!"]));
    var cd=E("div",{c:"card",id:"wcd",s:{marginBottom:"12px",padding:"36px 20px",position:"relative",transition:"border-color .2s"}});
    cd.appendChild(E("div",{c:"b",id:"wd",s:{fontSize:"44px",letterSpacing:"4px",animation:"pi .2s ease-out"}},[qs[cur].disp.toUpperCase()]));
    w.appendChild(cd);
    // Error feedback area placeholder
    w.appendChild(E("div",{id:"efb",s:{minHeight:"16px"}}));
    var row=E("div",{c:"row"});
    row.appendChild(E("button",{s:{flex:"1 1 120px",maxWidth:"180px",padding:"18px 16px",fontSize:"20px",fontFamily:"'Bangers',cursive",background:"linear-gradient(135deg,#1a3a1a,#1a5c2a)",color:"#2ecc40",border:"3px solid rgba(46,204,64,.4)",borderRadius:"16px"},onclick:function(){doAns(true)}},["✅ Giusta!"]));
    row.appendChild(E("button",{s:{flex:"1 1 120px",maxWidth:"180px",padding:"18px 16px",fontSize:"20px",fontFamily:"'Bangers',cursive",background:"linear-gradient(135deg,#3a1a1a,#5c1a1a)",color:"#e74c3c",border:"3px solid rgba(231,76,60,.4)",borderRadius:"16px"},onclick:function(){doAns(false)}},["❌ Sbagliata!"]));
    w.appendChild(row);c.appendChild(w);
  }

  function doAns(yes){
    if(over||cur>=qs.length||blocked)return;
    var q=qs[cur],ok=yes===q.ok;
    ans++;
    if(ok){
      var bo=st>=2?3:0;sc+=8+bo;st++;if(st>bs)bs=st;
      var cd=$("wcd");
      if(cd){cd.style.borderColor="rgba(46,204,64,.6)";setTimeout(function(){if(cd)cd.style.borderColor=""},300)}
      var sd=$("scd");if(sd)sd.textContent="💰 "+sc;
      if(cur+1>=qs.length){end();return}
      cur++;
      setTimeout(function(){if(!over)nextWord()},150);
    } else {
      st=0;
      errs.push({given:q.disp,correct:q.correct,hint:q.hint});
      // BIG error overlay
      var ov=E("div",{c:"bx"});ov.appendChild(E("div",{c:"bx-i"},["❌"]));
      document.body.appendChild(ov);
      setTimeout(function(){if(ov.parentNode)ov.parentNode.removeChild(ov)},900);
      // Shake card + red border
      var wcd=$("wcd");
      if(wcd){wcd.style.borderColor="rgba(231,76,60,.7)";wcd.style.animation="shake .4s ease-out";setTimeout(function(){if(wcd){wcd.style.animation="none";wcd.style.borderColor=""}},500)}
      // Error detail bar
      var efb=$("efb");
      if(efb){
        efb.innerHTML="";
        var bar=E("div",{c:"re"});
        bar.appendChild(E("div",{c:"b",s:{fontSize:"16px",color:"#e74c3c",marginBottom:"6px"}},["SBAGLIATO!"]));
        var inner=E("div",{s:{display:"flex",justifyContent:"center",alignItems:"center",gap:"12px"}});
        inner.appendChild(E("span",{c:"ew",s:{fontSize:"18px"}},[q.disp.toUpperCase()]));
        inner.appendChild(E("span",{s:{color:"#888",fontSize:"16px"}},["➜"]));
        inner.appendChild(E("span",{c:"ek",s:{fontSize:"22px"}},[q.correct.toUpperCase()]));
        bar.appendChild(inner);efb.appendChild(bar);
      }
      blocked=true;
      if(errTO)clearTimeout(errTO);
      errTO=setTimeout(function(){
        blocked=false;
        var efb2=$("efb");if(efb2)efb2.innerHTML="";
        if(cur+1>=qs.length){end();return}
        cur++;
        if(!over)nextWord();
      },1200);
    }
  }

  function nextWord(){
    var wd=$("wd");
    if(wd&&cur<qs.length){wd.style.animation="none";wd.offsetHeight;wd.style.animation="pi .2s ease-out";wd.textContent=qs[cur].disp.toUpperCase()}
    var sd=$("scd");if(sd)sd.textContent="💰 "+sc;
  }

  tmr=setInterval(function(){
    tl--;if(tl<=0){tl=0;end()}
    var tc=tl>15?"#2ecc40":tl>5?"#f39c12":"#e74c3c";
    var t=$("tmr");if(t){t.textContent="⏰ "+tl+"s";t.style.color=tc;t.style.background=tc+"22"}
    var f=$("tfl");if(f){f.style.width=(tl/45*100)+"%";f.style.background=tc}
  },1000);
  _gtmr=tmr;
  render();
}

menu();
})();
</script>
